<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayush K Sanil | DevOps Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f172a;color:white;overflow-x:hidden;}

/* Background */
body::before{
    content:"";position:fixed;width:600px;height:600px;
    background:radial-gradient(circle,#3b82f6,transparent 60%);
    top:-200px;left:-200px;animation:float 8s infinite alternate;z-index:-1;
}
body::after{
    content:"";position:fixed;width:500px;height:500px;
    background:radial-gradient(circle,#9333ea,transparent 60%);
    bottom:-200px;right:-200px;animation:float 10s infinite alternate;z-index:-1;
}
@keyframes float{from{transform:translateY(0px);}to{transform:translateY(50px);}}

section{padding:80px 10%;text-align:center;}
h1{font-size:3rem;}
h2{font-size:2rem;margin-bottom:20px;}
p{max-width:700px;margin:auto;line-height:1.6;opacity:0.8;}

.btn{
    display:inline-block;margin-top:20px;padding:10px 20px;border-radius:30px;
    background:linear-gradient(45deg,#3b82f6,#9333ea);
    color:white;text-decoration:none;transition:0.3s;
}
.btn:hover{transform:scale(1.1);}

/* Skills */
.skill-bar{width:70%;margin:20px auto;background:#1e293b;border-radius:30px;overflow:hidden;}
.skill-fill{height:20px;width:0;background:linear-gradient(90deg,#3b82f6,#9333ea);border-radius:30px;transition:2s;}

/* Tools */
.tools span{
    display:inline-block;margin:10px;padding:8px 15px;
    background:#1e293b;border-radius:20px;transition:0.3s;
}
.tools span:hover{background:#3b82f6;}

/* Typing */
.typing{color:#3b82f6;font-weight:600;border-right:2px solid white;padding-right:5px;}

/* Contact Form */
.contact-form{
    max-width:500px;margin:30px auto;display:flex;flex-direction:column;gap:15px;
}
.contact-form input,.contact-form textarea{
    padding:12px;border-radius:10px;border:none;background:#1e293b;color:white;
}
.contact-form textarea{resize:none;height:120px;}
.contact-form button{
    padding:12px;border-radius:30px;border:none;
    background:linear-gradient(45deg,#3b82f6,#9333ea);
    color:white;cursor:pointer;transition:0.3s;
}
.contact-form button:hover{transform:scale(1.05);}

.success-message{margin-top:15px;color:#3b82f6;display:none;}
</style>
</head>

<body>

<section>
    <h1>Ayush K Sanil</h1>
    <h2>I am a <span class="typing"></span></h2>
    <a href="https://github.com/25bcla14-5942" target="_blank" class="btn">Visit My GitHub</a>
</section>

<section>
    <h2>About Me</h2>
    <p>
        I am a BCA Cloud Computing student passionate about DevOps and cloud technologies.
    </p>
</section>

<section>
    <h2>Skills</h2>
    <p>Python</p>
    <div class="skill-bar"><div class="skill-fill" style="width:85%"></div></div>
    <p>Java</p>
    <div class="skill-bar"><div class="skill-fill" style="width:70%"></div></div>
    <p>HTML & CSS</p>
    <div class="skill-bar"><div class="skill-fill" style="width:90%"></div></div>
</section>

<section>
    <h2>Contact Me</h2>

    <!-- ✅ UPDATED FORM -->
    <form id="contactForm" class="contact-form">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
        <div class="success-message" id="successMsg">Message sent successfully 🚀</div>
    </form>

</section>

<script>

// Typing Animation
const words = ["DevOps Enthusiast", "Cloud Learner", "Automation Focused"];
let i = 0, j = 0, currentWord = "", isDeleting = false;
const typingElement = document.querySelector(".typing");

function type(){
    currentWord = words[i];
    if(isDeleting){
        typingElement.textContent = currentWord.substring(0,j--);
        if(j < 0){ isDeleting = false; i = (i+1)%words.length; }
    } else {
        typingElement.textContent = currentWord.substring(0,j++);
        if(j > currentWord.length){ isDeleting = true; }
    }
    setTimeout(type,100);
}
type();

// ✅ CONNECTED TO RENDER BACKEND
const form = document.getElementById("contactForm");
const successMsg = document.getElementById("successMsg");

form.addEventListener("submit", async function(e){
    e.preventDefault();

    const formData = {
        name: form.name.value,
        email: form.email.value,
        message: form.message.value
    };

    try {
        const response = await fetch("https://backend-3-m9ru.onrender.com", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(formData)
        });

        const result = await response.json();

        if(response.ok){
            successMsg.style.display = "block";
            form.reset();
        } else {
            alert("Error: " + result.message);
        }

    } catch (error) {
        alert("Server not responding");
    }
});
</script>

</body>
</html>
